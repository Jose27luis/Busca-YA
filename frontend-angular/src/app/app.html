<div class="shell">
  <aside class="rail">
    <a class="marca" routerLink="/">
      <span class="logo">B</span>
      <span class="nombre">Busca-YA</span>
    </a>

    <a class="nav-item" routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>
      Inicio
    </a>
    <a class="nav-item" routerLink="/articulos" routerLinkActive="activo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
      Artículos
    </a>
    <a class="nav-item" routerLink="/buscar" routerLinkActive="activo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      Búsqueda IA
    </a>
    <a class="nav-item" routerLink="/chat" routerLinkActive="activo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V6a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
      Chatbot
    </a>

    <div class="nav-sep"></div>
    <div class="nav-grupo">Colaboración</div>

    <a class="nav-item" routerLink="/editor" routerLinkActive="activo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      Editor IA
    </a>
    <a class="nav-item" routerLink="/perfil" routerLinkActive="activo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Perfil / Historial
    </a>
    @if (esAdmin()) {
      <a class="nav-item" routerLink="/admin" routerLinkActive="activo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/></svg>
        Administración
      </a>
    }

    <div class="rail-relleno"></div>

    <div class="sesion">
      <div class="sesion-titulo">Sesión</div>
      <div class="sesion-usuario">
        <span class="avatar">{{ inicial() }}</span>
        <span style="font: 600 13px 'IBM Plex Sans'">{{ rolEtiqueta() }}</span>
      </div>
      @if (autenticado()) {
        <button class="btn-sesion btn-secundario" (click)="cerrarSesion()">Cerrar sesión</button>
      } @else {
        <a class="btn-sesion btn-primario" routerLink="/auth" style="display: block; text-align: center">Iniciar sesión</a>
      }
    </div>
  </aside>

  <div class="contenido">
    <header class="encabezado">
      <div class="enc-seccion">Busca-YA</div>
      <div style="flex: 1"></div>
      <a class="enc-buscar" routerLink="/buscar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        Buscar con IA
      </a>
      <span class="enc-rol">{{ rolEtiqueta() }}</span>
    </header>

    <main class="principal">
      <router-outlet />
    </main>
  </div>

  <a class="chat-flotante" routerLink="/chat" aria-label="Abrir chatbot">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V6a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
  </a>

  <nav class="tabbar">
    <a class="tab-item" routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/></svg>
      <span>Inicio</span>
    </a>
    <a class="tab-item" routerLink="/articulos" routerLinkActive="activo">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
      <span>Artículos</span>
    </a>
    <a class="tab-item" routerLink="/buscar" routerLinkActive="activo">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <span>Buscar</span>
    </a>
    <a class="tab-item" routerLink="/chat" routerLinkActive="activo">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V6a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
      <span>Chat</span>
    </a>
    <a class="tab-item" routerLink="/perfil" routerLinkActive="activo">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span>Cuenta</span>
    </a>
  </nav>
</div>
